  <text x="150" y="520" fill="#9bb0c7" font-family="Inter, Arial, sans-serif" font-size="30">Deploy workloads, compare provider bids, and scale with transparent economics.</text>
  <rect x="850" y="170" width="200" height="200" rx="28" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.14)"/>
  <path d="M915 220h55c24.853 0 45 20.147 45 45v10c0 24.853-20.147 45-45 45h-55" fill="none" stroke="#8fd3ff" stroke-linecap="round" stroke-width="18"/>
  <circle cx="905" cy="270" r="28" fill="#00ffc2"/>
