<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Comnetish social card</title>
  <desc id="desc">Comnetish decentralized cloud marketing image.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060a12"/>
      <stop offset="100%" stop-color="#101f34"/>
    </linearGradient>
    <radialGradient id="mint" cx="0.15" cy="0.1" r="0.6">
      <stop offset="0%" stop-color="#00ffc2" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#00ffc2" stop-opacity="0"/>
